<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Raanix — Project One</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; user-select:none; }
  html, body { width:100%; height:100%; overflow:hidden; background:#000; font-family: 'Segoe UI', Arial, sans-serif; }
  canvas { display:block; touch-action:none; }

  #hud {
    position:fixed; inset:0; pointer-events:none; z-index:10; color:#eee;
  }
  #crosshair{
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    width:20px; height:20px;
  }
  #crosshair::before, #crosshair::after{
    content:""; position:absolute; background:rgba(230,230,230,0.85);
  }
  #crosshair::before{ left:9px; top:0; width:2px; height:20px; }
  #crosshair::after{ top:9px; left:0; width:20px; height:2px; }

  #topbar{
    position:absolute; top:14px; left:14px; right:14px;
    display:flex; justify-content:space-between; align-items:flex-start;
    font-size:14px; letter-spacing:0.03em;
  }
  .stat{ background:rgba(10,10,12,0.55); border:1px solid rgba(207,157,75,0.35); border-radius:4px; padding:8px 14px; }
  .stat b{ color:#e8b968; }

  #health-wrap{
    position:absolute; bottom:22px; left:14px; width:180px;
  }
  #health-label{ font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:#c9a24b; margin-bottom:4px; }
  #health-bar-bg{ background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); border-radius:3px; height:14px; overflow:hidden; }
  #health-bar{ height:100%; width:100%; background:linear-gradient(90deg,#8a2b2b,#d4433f); transition: width .15s ease; }

  #ammo{
    position:absolute; bottom:22px; right:14px; text-align:right; font-size:22px; color:#f2ede2;
  }
  #ammo span{ font-size:12px; color:#8a8478; display:block; letter-spacing:0.1em; }

  #hitflash{
    position:absolute; inset:0; background:rgba(180,20,20,0.0); transition: background .1s ease;
  }

  #msg-overlay{
    position:fixed; inset:0; background:rgba(6,6,7,0.92); z-index:30;
    display:flex; align-items:center; justify-content:center; flex-direction:column; text-align:center; padding:2rem;
  }
  #msg-overlay h1{ font-size: 2rem; color:#e8b968; margin-bottom:0.8rem; letter-spacing:0.02em; }
  #msg-overlay p{ color:#a49c8c; max-width:380px; line-height:1.6; margin-bottom:1.6rem; font-size:0.95rem; }
  #msg-overlay button{
    background:#cf9d4b; border:none; color:#0a0a0b; font-weight:600; letter-spacing:0.06em;
    text-transform:uppercase; font-size:0.85rem; padding:0.9rem 2rem; border-radius:3px; cursor:pointer;
  }
  #msg-overlay button:hover{ background:#e8b968; }
  .hint{ font-size:0.8rem; color:#6b6558; margin-top:1rem; }

  /* mobile controls */
  #mobile-controls{ display:none; }
  #joystick-zone{
    position:absolute; left:0; bottom:0; width:45%; height:45%; pointer-events:auto;
  }
  #joystick-base{
    position:absolute; width:96px; height:96px; border-radius:50%;
    background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.18);
    display:none;
  }
  #joystick-stick{
    position:absolute; width:44px; height:44px; border-radius:50%;
    background:rgba(207,157,75,0.55); border:1px solid rgba(232,185,104,0.8);
    top:50%; left:50%; transform:translate(-50%,-50%);
  }
  #look-zone{
    position:absolute; right:0; bottom:0; width:55%; height:100%; pointer-events:auto;
  }
  #shoot-btn{
    position:absolute; right:26px; bottom:110px; width:76px; height:76px; border-radius:50%;
    background:rgba(207,58,58,0.35); border:2px solid rgba(232,120,104,0.8);
    color:#fff; font-size:11px; letter-spacing:0.05em; text-transform:uppercase;
    display:flex; align-items:center; justify-content:center; pointer-events:auto; z-index:20;
  }
</style>
</head>
<body>

<div id="hud">
  <div id="topbar">
    <div class="stat">RAANIX <b>· PROJECT ONE</b></div>
    <div class="stat">ENEMIES <b id="enemy-count">0</b></div>
  </div>
  <div id="crosshair"></div>
  <div id="health-wrap">
    <div id="health-label">Health</div>
    <div id="health-bar-bg"><div id="health-bar"></div></div>
  </div>
  <div id="ammo"><span>Ammo</span><span id="ammo-count">12</span></div>
  <div id="hitflash"></div>
</div>

<div id="mobile-controls">
  <div id="joystick-zone">
    <div id="joystick-base"><div id="joystick-stick"></div></div>
  </div>
  <div id="look-zone"></div>
  <div id="shoot-btn">FIRE</div>
</div>

<div id="msg-overlay">
  <h1>Project One</h1>
  <p>You're in the house. Something's already inside with you. Clear every room.</p>
  <button id="start-btn">Enter the house</button>
  <div class="hint" id="control-hint"></div>
</div>

<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
<script>
(function(){
  const isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
  document.getElementById('control-hint').textContent = isTouch
    ? "Left side: move · Right side: drag to look · FIRE button to shoot"
    : "WASD to move · Mouse to look · Click to shoot";
  if (isTouch) document.getElementById('mobile-controls').style.display = 'block';

  // ---------- Three.js setup ----------
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x08080a);
  scene.fog = new THREE.Fog(0x08080a, 6, 26);

  const camera = new THREE.PerspectiveCamera(72, window.innerWidth/window.innerHeight, 0.1, 100);
  camera.position.set(0, 1.6, 6);

  const renderer = new THREE.WebGLRenderer({ antialias:true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  document.body.appendChild(renderer.domElement);

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // ---------- Lighting ----------
  const amb = new THREE.AmbientLight(0x3a3630, 1.1);
  scene.add(amb);
  const lamp = new THREE.PointLight(0xcf9d4b, 1.1, 14);
  lamp.position.set(0, 3.2, 0);
  scene.add(lamp);

  function addFlicker(light, baseIntensity){
    let t = 0;
    return function(dt){
      t += dt;
      light.intensity = baseIntensity + Math.sin(t*8)*0.06 + (Math.random()-0.5)*0.05;
    };
  }
  const flickers = [addFlicker(lamp, 1.1)];

  // ---------- Materials ----------
  const wallMat = new THREE.MeshStandardMaterial({ color:0x1c1a17, roughness:0.9 });
  const floorMat = new THREE.MeshStandardMaterial({ color:0x14110f, roughness:1 });
  const doorMat = new THREE.MeshStandardMaterial({ color:0x2a231a, roughness:0.8 });

  // ---------- House layout ----------
  // Rooms defined as simple rectangular boxes with walls; corridors connect them.
  const walls = []; // for collision
  const roomLights = [];

  function makeFloor(cx, cz, w, d){
    const f = new THREE.Mesh(new THREE.PlaneGeometry(w, d), floorMat);
    f.rotation.x = -Math.PI/2;
    f.position.set(cx, 0, cz);
    f.receiveShadow = true;
    scene.add(f);
    const ceil = new THREE.Mesh(new THREE.PlaneGeometry(w, d), wallMat);
    ceil.rotation.x = Math.PI/2;
    ceil.position.set(cx, 3.4, cz);
    scene.add(ceil);
  }

  function makeWall(x, z, w, h, rotY, opening){
    // opening: {start, end} along wall's local width axis, in same units as w, to leave a doorway gap
    if (!opening){
      const wall = new THREE.Mesh(new THREE.BoxGeometry(w, h, 0.2), wallMat);
      wall.position.set(x, h/2, z);
      wall.rotation.y = rotY;
      wall.castShadow = true;
      scene.add(wall);
      walls.push(wall);
      return;
    }
    // split wall into two segments around the opening
    const segALen = opening.start;
    const segBLen = w - opening.end;
    if (segALen > 0.05){
      const a = new THREE.Mesh(new THREE.BoxGeometry(segALen, h, 0.2), wallMat);
      const localX = -w/2 + segALen/2;
      a.position.set(x + Math.cos(rotY)*localX, h/2, z - Math.sin(rotY)*localX);
      a.rotation.y = rotY;
      scene.add(a); walls.push(a);
    }
    if (segBLen > 0.05){
      const b = new THREE.Mesh(new THREE.BoxGeometry(segBLen, h, 0.2), wallMat);
      const localX = w/2 - segBLen/2;
      b.position.set(x + Math.cos(rotY)*localX, h/2, z - Math.sin(rotY)*localX);
      b.rotation.y = rotY;
      scene.add(b); walls.push(b);
    }
  }

  // Simple 3-room house: living room -> hallway -> bedroom, plus a side kitchen
  makeFloor(0, 0, 10, 10);   // living room
  makeFloor(0, -9, 4, 8);    // hallway
  makeFloor(0, -16, 8, 6);   // bedroom
  makeFloor(7, 0, 6, 6);     // kitchen

  // Living room walls (10x10 centered at 0,0)
  makeWall(0, 5, 10, 3.4, 0, null);            // north
  makeWall(0, -5, 10, 3.4, 0, {start:3, end:7}); // south (doorway to hallway)
  makeWall(-5, 0, 10, 3.4, Math.PI/2, null);   // west
  makeWall(5, 0, 10, 3.4, Math.PI/2, {start:3.5, end:6.5}); // east (to kitchen)

  // Hallway walls (4x8 centered at 0,-9)
  makeWall(-2, -9, 8, 3.4, Math.PI/2, null);
  makeWall(2, -9, 8, 3.4, Math.PI/2, null);
  makeWall(0, -13, 4, 3.4, 0, {start:1, end:3}); // to bedroom

  // Bedroom walls (8x6 centered at 0,-16)
  makeWall(0, -19, 8, 3.4, 0, null);
  makeWall(-4, -16, 6, 3.4, Math.PI/2, null);
  makeWall(4, -16, 6, 3.4, Math.PI/2, null);

  // Kitchen walls (6x6 centered at 7,0)
  makeWall(7, 3, 6, 3.4, 0, null);
  makeWall(7, -3, 6, 3.4, 0, null);
  makeWall(10, 0, 6, 3.4, Math.PI/2, null);

  // extra lamps
  [[0,-9],[0,-16],[7,0]].forEach(([x,z]) => {
    const l = new THREE.PointLight(0xcf9d4b, 0.8, 10);
    l.position.set(x, 3, z);
    scene.add(l);
    flickers.push(addFlicker(l, 0.8));
  });

  // simple furniture blocks for cover/detail
  function block(x,z,w,h,d,color=0x22201c){
    const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), new THREE.MeshStandardMaterial({color, roughness:0.85}));
    m.position.set(x, h/2, z);
    scene.add(m);
    walls.push(m);
  }
  block(-3, 2, 2, 0.9, 1, 0x2a2620);   // couch
  block(2.5, -2, 1.2, 0.8, 1.2, 0x241f18); // table
  block(7, 1, 1.6, 0.9, 0.8, 0x27221b);  // counter
  block(-2, -16, 2, 0.9, 1.4, 0x241f18); // bed frame

  // ---------- Player state ----------
  const player = {
    height: 1.6,
    speed: 4.2,
    velocity: new THREE.Vector3(),
    health: 100,
    maxHealth: 100,
    ammo: 12,
    maxAmmo: 12,
    reloadTime: 1.1,
    reloading: false,
    yaw: 0,
    pitch: 0,
    dead: false,
  };
  camera.position.set(0, player.height, 6);

  // ---------- Weapon model (simple shapes) ----------
  const weapon = new THREE.Group();
  const gunBody = new THREE.Mesh(new THREE.BoxGeometry(0.08,0.08,0.35), new THREE.MeshStandardMaterial({color:0x1a1a1c, metalness:0.6, roughness:0.4}));
  const gunGrip = new THREE.Mesh(new THREE.BoxGeometry(0.06,0.16,0.06), new THREE.MeshStandardMaterial({color:0x0f0f10}));
  gunGrip.position.set(0,-0.1,0.1);
  weapon.add(gunBody, gunGrip);
  weapon.position.set(0.22, -0.22, -0.5);
  camera.add(weapon);
  scene.add(camera);

  const muzzleFlash = new THREE.PointLight(0xffcf80, 0, 4);
  muzzleFlash.position.set(0.22, -0.15, -0.7);
  camera.add(muzzleFlash);

  // ---------- Enemies ----------
  const enemies = [];
  function spawnEnemy(x,z){
    const g = new THREE.Group();
    const body = new THREE.Mesh(new THREE.BoxGeometry(0.5,1.1,0.35), new THREE.MeshStandardMaterial({color:0x3a1414, roughness:0.9}));
    body.position.y = 0.75;
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.22,10,10), new THREE.MeshStandardMaterial({color:0x4a1c1c, roughness:0.9}));
    head.position.y = 1.45;
    g.add(body, head);
    g.position.set(x, 0, z);
    scene.add(g);
    enemies.push({ mesh:g, health:40, maxHealth:40, speed: 1.1 + Math.random()*0.6, alive:true, attackCooldown:0 });
  }

  spawnEnemy(0, -1);
  spawnEnemy(-3, -7);
  spawnEnemy(0, -14);
  spawnEnemy(7, -1);
  spawnEnemy(2, -17);

  document.getElementById('enemy-count').textContent = enemies.length;

  // ---------- Controls: desktop ----------
  const keys = {};
  window.addEventListener('keydown', e => keys[e.code] = true);
  window.addEventListener('keyup', e => keys[e.code] = false);

  let pointerLocked = false;
  renderer.domElement.addEventListener('click', () => {
    if (!isTouch && !pointerLocked && started && !player.dead) renderer.domElement.requestPointerLock();
    else if (!isTouch && pointerLocked) shoot();
  });
  document.addEventListener('pointerlockchange', () => {
    pointerLocked = document.pointerLockElement === renderer.domElement;
  });
  document.addEventListener('mousemove', e => {
    if (!pointerLocked) return;
    player.yaw -= e.movementX * 0.0022;
    player.pitch -= e.movementY * 0.0022;
    player.pitch = Math.max(-1.2, Math.min(1.2, player.pitch));
  });

  // ---------- Controls: mobile ----------
  let joyActive = false, joyStartX=0, joyStartY=0, joyDX=0, joyDY=0;
  const joyZone = document.getElementById('joystick-zone');
  const joyBase = document.getElementById('joystick-base');
  const joyStick = document.getElementById('joystick-stick');

  joyZone.addEventListener('touchstart', e => {
    const t = e.changedTouches[0];
    joyActive = true; joyStartX = t.clientX; joyStartY = t.clientY;
    joyBase.style.display = 'block';
    joyBase.style.left = (t.clientX-48)+'px';
    joyBase.style.top = (t.clientY-48)+'px';
  });
  joyZone.addEventListener('touchmove', e => {
    if (!joyActive) return;
    const t = e.changedTouches[0];
    let dx = t.clientX - joyStartX, dy = t.clientY - joyStartY;
    const max = 42;
    const len = Math.hypot(dx,dy);
    if (len > max){ dx = dx/len*max; dy = dy/len*max; }
    joyDX = dx/max; joyDY = dy/max;
    joyStick.style.transform = `translate(${dx-22+22}px, ${dy-22+22}px) translate(-50%,-50%)`;
    joyStick.style.left = (22+dx)+'px';
    joyStick.style.top = (22+dy)+'px';
    e.preventDefault();
  }, {passive:false});
  joyZone.addEventListener('touchend', () => {
    joyActive = false; joyDX=0; joyDY=0;
    joyBase.style.display = 'none';
    joyStick.style.left = '50%'; joyStick.style.top='50%';
    joyStick.style.transform = 'translate(-50%,-50%)';
  });

  const lookZone = document.getElementById('look-zone');
  let lookTouchId = null, lastLookX=0, lastLookY=0;
  lookZone.addEventListener('touchstart', e => {
    const t = e.changedTouches[0];
    lookTouchId = t.identifier; lastLookX = t.clientX; lastLookY = t.clientY;
  });
  lookZone.addEventListener('touchmove', e => {
    for (const t of e.changedTouches){
      if (t.identifier === lookTouchId){
        const dx = t.clientX - lastLookX, dy = t.clientY - lastLookY;
        player.yaw -= dx * 0.0032;
        player.pitch -= dy * 0.0032;
        player.pitch = Math.max(-1.2, Math.min(1.2, player.pitch));
        lastLookX = t.clientX; lastLookY = t.clientY;
      }
    }
    e.preventDefault();
  }, {passive:false});
  lookZone.addEventListener('touchend', e => {
    for (const t of e.changedTouches) if (t.identifier === lookTouchId) lookTouchId = null;
  });

  document.getElementById('shoot-btn').addEventListener('touchstart', e => { e.preventDefault(); shoot(); });

  // ---------- Shooting ----------
  const raycaster = new THREE.Raycaster();
  const ammoEl = document.getElementById('ammo-count');
  const healthBar = document.getElementById('health-bar');
  const hitflash = document.getElementById('hitflash');

  function shoot(){
    if (player.dead || !started) return;
    if (player.reloading) return;
    if (player.ammo <= 0){ reload(); return; }
    player.ammo--;
    ammoEl.textContent = player.ammo;
    muzzleFlash.intensity = 3;
    setTimeout(() => muzzleFlash.intensity = 0, 60);

    raycaster.setFromCamera({x:0,y:0}, camera);
    const meshes = enemies.filter(e=>e.alive).map(e=>e.mesh.children).flat();
    const hits = raycaster.intersectObjects(meshes, false);
    if (hits.length){
      const hitMesh = hits[0].object;
      const enemy = enemies.find(e => e.alive && e.mesh.children.includes(hitMesh));
      if (enemy) damageEnemy(enemy, 20);
    }
    if (player.ammo <= 0) reload();
  }

  function reload(){
    if (player.reloading) return;
    player.reloading = true;
    setTimeout(() => {
      player.ammo = player.maxAmmo;
      ammoEl.textContent = player.ammo;
      player.reloading = false;
    }, player.reloadTime*1000);
  }

  function damageEnemy(enemy, amount){
    enemy.health -= amount;
    enemy.mesh.children.forEach(m => m.material.emissive = new THREE.Color(0x552222));
    setTimeout(() => enemy.mesh.children.forEach(m => m.material.emissive = new THREE.Color(0x000000)), 100);
    if (enemy.health <= 0 && enemy.alive){
      enemy.alive = false;
      scene.remove(enemy.mesh);
      document.getElementById('enemy-count').textContent = enemies.filter(e=>e.alive).length;
      if (enemies.every(e => !e.alive)) winGame();
    }
  }

  function damagePlayer(amount){
    player.health = Math.max(0, player.health - amount);
    healthBar.style.width = (player.health/player.maxHealth*100)+'%';
    hitflash.style.background = 'rgba(180,20,20,0.35)';
    setTimeout(()=> hitflash.style.background = 'rgba(180,20,20,0)', 120);
    if (player.health <= 0 && !player.dead) loseGame();
  }

  // ---------- Collision ----------
  const playerRadius = 0.35;
  function collides(x,z){
    for (const w of walls){
      const box = new THREE.Box3().setFromObject(w);
      box.expandByScalar(playerRadius);
      if (x > box.min.x && x < box.max.x && z > box.min.z && z < box.max.z) return true;
    }
    return false;
  }

  // ---------- Game state / overlay ----------
  let started = false;
  const overlay = document.getElementById('msg-overlay');
  document.getElementById('start-btn').addEventListener('click', () => {
    overlay.style.display = 'none';
    started = true;
    if (!isTouch) renderer.domElement.requestPointerLock();
  });

  function winGame(){
    started = false;
    document.exitPointerLock && document.exitPointerLock();
    overlay.innerHTML = `<h1>House Cleared</h1><p>Every room is quiet now. Nice work.</p><button id="restart-btn">Play again</button>`;
    overlay.style.display = 'flex';
    document.getElementById('restart-btn').addEventListener('click', () => location.reload());
  }
  function loseGame(){
    player.dead = true;
    started = false;
    document.exitPointerLock && document.exitPointerLock();
    overlay.innerHTML = `<h1>You Didn't Make It</h1><p>The house won this time.</p><button id="restart-btn">Try again</button>`;
    overlay.style.display = 'flex';
    document.getElementById('restart-btn').addEventListener('click', () => location.reload());
  }

  // ---------- Main loop ----------
  const clock = new THREE.Clock();
  function animate(){
    requestAnimationFrame(animate);
    const dt = Math.min(clock.getDelta(), 0.05);
    flickers.forEach(f => f(dt));

    camera.rotation.order = 'YXZ';
    camera.rotation.y = player.yaw;
    camera.rotation.x = player.pitch;

    if (started && !player.dead){
      // movement
      let mx = 0, mz = 0;
      if (!isTouch){
        if (keys['KeyW']) mz -= 1;
        if (keys['KeyS']) mz += 1;
        if (keys['KeyA']) mx -= 1;
        if (keys['KeyD']) mx += 1;
      } else {
        mx = joyDX; mz = joyDY;
      }
      const len = Math.hypot(mx,mz);
      if (len > 0.05){
        mx/=len; mz/=len;
        const forward = new THREE.Vector3(Math.sin(player.yaw), 0, Math.cos(player.yaw));
        const right = new THREE.Vector3(Math.sin(player.yaw+Math.PI/2), 0, Math.cos(player.yaw+Math.PI/2));
        const move = new THREE.Vector3();
        move.addScaledVector(forward, -mz);
        move.addScaledVector(right, mx);
        move.normalize().multiplyScalar(player.speed * dt * Math.min(len,1));
        const nx = camera.position.x + move.x;
        const nz = camera.position.z + move.z;
        if (!collides(nx, camera.position.z)) camera.position.x = nx;
        if (!collides(camera.position.x, nz)) camera.position.z = nz;
      }

      // enemy AI
      enemies.forEach(e => {
        if (!e.alive) return;
        const dx = camera.position.x - e.mesh.position.x;
        const dz = camera.position.z - e.mesh.position.z;
        const dist = Math.hypot(dx,dz);
        if (dist > 1.1){
          const nx = e.mesh.position.x + dx/dist * e.speed * dt;
          const nz = e.mesh.position.z + dz/dist * e.speed * dt;
          e.mesh.position.x = nx; e.mesh.position.z = nz;
          e.mesh.rotation.y = Math.atan2(dx, dz);
        } else {
          e.attackCooldown -= dt;
          if (e.attackCooldown <= 0){
            damagePlayer(8);
            e.attackCooldown = 1.0;
          }
        }
      });
    }

    renderer.render(scene, camera);
  }
  animate();
})();
</script>
</body>
</html>
