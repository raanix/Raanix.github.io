<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>First Race - Legacy Road</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="raceCanvas" width="1000" height="600"></canvas>
  <script>
    const canvas = document.getElementById('raceCanvas');
    const ctx = canvas.getContext('2d');
    
    let carY = 400;
    let speed = 0;

    function gameLoop() {
      ctx.fillStyle = '#111133';
      ctx.fillRect(0, 0, 1000, 600);
      
      // Road
      ctx.fillStyle = '#222255';
      ctx.fillRect(200, 0, 600, 600);
      
      // Road lines
      ctx.fillStyle = '#ffff00';
      for (let i = 0; i < 10; i++) {
        ctx.fillRect(480, i*80 - (Date.now()/5 % 80), 40, 40);
      }
      
      // Car
      ctx.fillStyle = '#000000';
      ctx.fillRect(450, carY, 100, 60);
      
      ctx.fillStyle = '#00ffff';
      ctx.fillRect(460, carY+10, 80, 40);
      
      document.getElementById('raceCanvas').onclick = () => speed = 8;
      
      carY -= speed;
      if (carY < -100) carY = 600;
      
      requestAnimationFrame(gameLoop);
    }
    
    gameLoop();
    
    setTimeout(() => {
      alert("Flashback moment...\nYou remembered your dad's crash and lost focus.");
    }, 4000);
  </script>
  <button onclick="window.location.href='index.html'" style="position:absolute; top:10px; left:10px;">Exit Race</button>
</body>
</html>
